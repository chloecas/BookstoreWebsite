    <header>

        <button type="button" id="login">
            <figure>
                <a href="pages/login.html"><img class="icon" src="img/BookStoreLogo.png" alt="Account"></a>
                <figcaption>Access Account</figcaption>

        </button>

        <a href="../pages/home.html" class="header-click"></a>


        <button type="button" id="cart">
            <figure>

        </ul>
    </nav>
    <main>
        <div class="contact-form">
            <h1>Contact us</h1>
            <form action="action_page.php">

                <label for="fname">First Name</label>
                <input type="text" id="fname" name="firstname" placeholder="Your name..">

                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lastname" placeholder="Your last name..">

                <label for="country">Country</label>
                <select id="country" name="country">
                    <option value="australia">Canada</option>
                    <option value="canada">USA</option>
                    <option value="usa">Australia</option>
                </select>

                <label for="subject">Subject</label>
                <textarea id="subject" name="subject" placeholder="Write something.." style="height:200px"></textarea>

                <input type="submit" value="Submit">

            </form>
        </div>
    </main>
    <footer>
        <nav>
            <div class="footer-container">
                <ul id="footerList">

                        </div>

                </ul>

                <div>
                    <p class="contact">Contact us: 821 Sainte-Croix Ave, Montreal H4L 3X9, Quebec 514-744-7500</p>
                </div>

                <div class="socials">
                    <label>Find us on social media</label>
                    <button type="button">

                    <button type="button">
