<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link href="../stylesheet/baseStyle.css" rel="stylesheet" type="text/css">
    <link href="../stylesheet/cartStyle.css" rel="stylesheet" type="text/css">
    <script src="../javascript/shoppingCart.js" defer></script>
</head>

<body>
    <header>
        <button type="button" id="login">
            <figure>
                <img class="icon" src="../img/BookStoreLogo.png" alt="Account">
                <figcaption>Access Account</figcaption>
            </figure>
        </button>
        <a href="home.html" class="header-click"></a>
        <button type="button" id="cart">
            <figure>
                <a href="shoppingCart.html"><img class="icon" src="../img/CartLogo.png" alt="Checkout"></a>
                <figcaption>Checkout</figcaption>
            </figure>
        </button>
    </header>
    <nav>
        <ul>
            <li><a href="about.html">About</a></li>
            <li><a href="products.html">Products</a></li>
            <li><input type="text" placeholder="Search...">
                <button style="border: 1px solid white;" type="button">Enter</button>
            </li>
        </ul>
    </nav>
    <main>
       <h1>Shopping Cart</h1>

        <div class="cart-content">
            <!-- LEFT -->
            <div id="cartItems" class="cart-items"></div>

            <!-- RIGHT -->
            <div id="cartSummary" class="cart-summary"></div>
        </div>
    </main>
    <footer>
        <nav>
            <div class="footer-container">
                <ul id="footerList">
                    <li>
                        <a href="about.html">About</a>
                    </li>
                    <li>
                        <a href="contact.html">Contact</a>
                    </li>
                    <li>
                        <div class="newsletter">
                            <label>Subscribe to our newsletter</label>
                            <input type="email" placeholder="Enter your email">
                            <button type="button">Subscribe</button>
                        </div>
                    </li>
                </ul>

                <div>
                    <p class="contact">Contact us: 821 Sainte-Croix Ave, Montreal H4L 3X9, Quebec 514-744-7500</p>
                </div>

                <div class="socials">
                    <label>Find us on social media</label>
                    <button type="button">
                        <img class="icon" src="../img/instagram.png" alt="Instagram">
                    </button>
                    <button type="button">
                        <img class="icon" src="../img/tiktok.png" alt="TikTok">
                    </button>
                    <button type="button">
                        <img class="icon" src="../img/twitter.png" alt="Twitter">
                    </button>
                </div>
            </div>
        </nav>
    </footer>
</body>

</html>
